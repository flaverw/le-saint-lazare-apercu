<style>
:root{--noir:#14110f;--or:#c9a24b;--creme:#f3ecdd}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;
 background:radial-gradient(120% 120% at 50% 0%,#241f1a,var(--noir));color:var(--creme);
 display:flex;align-items:center;justify-content:center;padding:24px}
.card{max-width:420px;width:100%;text-align:center}
.mark{font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--or);margin-bottom:18px}
.lock{font-size:40px;margin-bottom:14px}
h1{font-size:22px;font-weight:600;line-height:1.25;margin-bottom:8px}
p.sub{font-size:14px;color:#b9b0a0;margin-bottom:22px;line-height:1.5}
form{display:flex;gap:8px;flex-direction:column}
input{width:100%;background:#1c1814;border:1px solid rgba(201,162,75,.4);color:var(--creme);
 padding:14px 16px;font-size:16px;border-radius:8px;text-align:center;letter-spacing:.05em}
input:focus{outline:none;border-color:var(--or)}
button{background:var(--or);color:var(--noir);border:none;padding:14px;font-size:15px;font-weight:600;
 border-radius:8px;cursor:pointer;letter-spacing:.03em}
button:hover{filter:brightness(1.08)}
.err{color:#e6857a;font-size:13px;min-height:18px;margin-top:4px}
.foot{margin-top:26px;font-size:11px;color:#7c7364;line-height:1.5}
</style></head>
